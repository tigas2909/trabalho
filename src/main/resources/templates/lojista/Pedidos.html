<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Pedidos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f4f4f4;
        }
        h1 {
            margin-bottom: 20px;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            text-decoration: none;
            color: black;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        .card:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #f0f0f0;
        }
        .pedido-info {
            text-align: left;
            margin-bottom: 8px;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Pedidos</h1>

    <div class="cards">
        <div class="card" th:each="pedido : ${pedidos}">
            <p>Pedido #<span th:text="${pedido.id}"></span></p>
            <p class="pedido-info">Cliente: <span th:text="${pedido.cliente.user.nome}"></span></p>
            <p class="pedido-info">Valor Total: R$ <span th:text="${pedido.valor}"></span></p>
            <a th:href="@{/lojista/pedidos/{id}/editar(id=${pedido.id})}">Editar</a>

            <table>
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Qtd</th>
                        <th>Valor</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${pedido.itens}">
                        <td th:text="${item.produto.nome}"></td>
                        <td th:text="${item.quantidade}"></td>
                        <td th:text="${item.valorTotal}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
