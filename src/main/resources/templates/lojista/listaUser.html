<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Lista de Usuários</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f4f4f4;
        }

        h1 {
            margin-bottom: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .btn {
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        .edit {
            background: #3498db;
            color: white;
        }

        .toggle {
            background: #e67e22;
            color: white;
        }

        .info {
            margin: 5px 0;
        }
    </style>
</head>

<body>

<h1>Lista de Usuários</h1>

<div class="cards">

    <div class="card" th:each="user : ${users}">

        <div class="info"><b>ID:</b> <span th:text="${user.id}"></span></div>
        <div class="info"><b>Nome:</b> <span th:text="${user.nome}"></span></div>
        <div class="info"><b>Email:</b> <span th:text="${user.email}"></span></div>
        <div class="info"><b>Status:</b> <span th:text="${user.status}"></span></div>

        <!-- EDITAR -->
        <a th:href="@{'/lojista/editarUser/' + ${user.id}}">
            <button class="btn edit">Editar</button>
        </a>

        <!-- TOGGLE -->
        <form th:action="@{'/lojista/toggle/' + ${user.id}}" method="post" style="display:inline;">
            <button class="btn toggle" type="submit">
                Trocar Status
            </button>
        </form>

    </div>

</div>

</body>
</html>
