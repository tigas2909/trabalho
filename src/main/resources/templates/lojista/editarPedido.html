<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Editar Pedido</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f4f4f4;
        }
        h1, h2 {
            margin-bottom: 20px;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            text-decoration: none;
            color: black;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        .card:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 10px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #f0f0f0;
        }
        button {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-remover {
            background: #e74c3c;
            color: white;
        }
        .btn-adicionar {
            background: #2ecc71;
            color: white;
            padding: 8px 16px;
            margin-top: 10px;
        }
        select, input[type="number"] {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ddd;
            margin-right: 10px;
        }
        .form-adicionar {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        a.voltar {
            display: inline-block;
            margin-bottom: 20px;
            color: #333;
            text-decoration: none;
            font-weight: bold;
        }
        a.voltar:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <a class="voltar" th:href="@{/lojista/pedidos}">← Voltar</a>

    <h1>Editar Pedido #<span th:text="${pedido.id}"></span></h1>
    <p>Cliente: <span th:text="${pedido.cliente.user.nome}"></span></p>
    <p>Valor Total: R$ <span th:text="${pedido.valor}"></span></p>

    <h2>Itens do Pedido</h2>
    <table>
        <thead>
            <tr>
                <th>Produto</th>
                <th>Quantidade</th>
                <th>Valor</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item : ${pedido.itens}">
                <td th:text="${item.produto.nome}"></td>
                <td th:text="${item.quantidade}"></td>
                <td th:text="${item.valorTotal}"></td>
                <td>
                    <form th:action="@{/lojista/pedidos/{id}/remover-item/{itemId}(id=${pedido.id},itemId=${item.id})}" method="post">
                        <button class="btn-remover" type="submit">Remover</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="form-adicionar">
        <h2>Adicionar Item</h2>
        <form th:action="@{/lojista/pedidos/{id}/adicionar-item(id=${pedido.id})}" method="post">
            <select name="produtoId">
                <option th:each="produto : ${produtos}"
                        th:value="${produto.id}"
                        th:text="${produto.nome}">
                </option>
            </select>
            <input type="number" name="quantidade" min="1" value="1" placeholder="Quantidade"/>
            <button class="btn-adicionar" type="submit">Adicionar</button>
        </form>
    </div>

</body>
</html>
