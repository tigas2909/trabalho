<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Histórico de Pedidos</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
        }

        header {
            background: #1f2937;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .titulo {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .info {
            font-size: 14px;
            margin-top: 5px;
        }

        .status {
            margin-top: 10px;
            font-weight: bold;
        }

        .aberto { color: #b45309; }
        .concluido { color: #15803d; }
        .cancelado { color: #b91c1c; }

        .section-title {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #1f2937;
            padding-left: 20px;
        }
        .btn {
            padding: 10px 15px;
            background: #1f2937;
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn:hover {
            background: #374151;
        }
    </style>
</head>

<body>

<header>
    📦 Histórico de Pedidos
</header>

<a class="btn" th:href="@{/cliente/retornar}">
    ⬅️ Voltar
</a>

<!-- ABERTOS -->
<div class="section-title">🟡 Abertos</div>
<div class="container">

    <div class="card" th:each="p : ${abertos}">
        <div class="titulo">
            Pedido #<span th:text="${p.id}"></span>
        </div>

        <div class="info">
            Cliente:
            <span th:text="${p.cliente?.user?.nome != null ? p.cliente.user.nome : 'Sem cliente'}"></span>
        </div>

        <div class="info"
             th:text="${'R$ ' + p.valor}">
        </div>

        <div class="status aberto"
             th:text="${p.status}">
        </div>
    </div>

</div>

<!-- CONCLUÍDOS -->
<div class="section-title">🟢 Concluídos</div>
<div class="container">

    <div class="card" th:each="p : ${concluidos}">
        <div class="titulo">
            Pedido #<span th:text="${p.id}"></span>
        </div>

        <div class="info">
            Cliente:
            <span th:text="${p.cliente?.user?.nome != null ? p.cliente.user.nome : 'Sem cliente'}"></span>
        </div>

        <div class="info"
             th:text="${'R$ ' + p.valor}">
        </div>

        <div class="status concluido"
             th:text="${p.status}">
        </div>
    </div>

</div>

<!-- CANCELADOS -->
<div class="section-title">🔴 Cancelados</div>
<div class="container">

    <div class="card" th:each="p : ${cancelados}">
        <div class="titulo">
            Pedido #<span th:text="${p.id}"></span>
        </div>

        <div class="info">
            Cliente:
            <span th:text="${p.cliente?.user?.nome != null ? p.cliente.user.nome : 'Sem cliente'}"></span>
        </div>

        <div class="info"
             th:text="${'R$ ' + p.valor}">
        </div>

        <div class="status cancelado"
             th:text="${p.status}">
        </div>
    </div>

</div>

</body>
</html>
