<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Carrinho</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: #1f2937;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f3f4f6;
        }

        .total {
            margin-top: 20px;
            text-align: right;
            font-size: 20px;
            font-weight: bold;
        }

        .btn {
            background: #1f2937;
            color: white;
            padding: 8px 12px;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #374151;
        }

        .actions {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>

<header>
    🛒 Seu Carrinho
</header>

<a class="btn" th:href="@{/cliente/retornar}">
    ⬅️ Voltar
</a>

<div class="container">

    <h3 th:text="${carrinho != null and carrinho.id != null and carrinho.id > 0} ? 'Carrinho do cliente #' + ${carrinho.id} : 'Seu Carrinho'"></h3>

    <table>
        <thead>
        <tr>
            <th>Produto</th>
            <th>Preço</th>
            <th>Quantidade</th>
            <th>Total</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="item : ${itens}">
            <td th:text="${item.produto.nome}"></td>

            <td th:text="${item.produto.preco}"></td>

            <td th:text="${item.quantidade}"></td>

            <td th:text="${item.valorTotal}"></td>
        </tr>

        <tr th:if="${itens == null or #lists.isEmpty(itens)}">
            <td colspan="4">Carrinho vazio</td>
        </tr>
        </tbody>
    </table>

    <div class="total">
        Total: R$ <span th:text="${carrinho.valor}"></span>
    </div>

    <div class="actions">
        <a th:href="@{/cliente/produtos}" class="btn">Continuar comprando</a>
        <form th:action="@{/cliente/pedido/finalizar}" method="post" style="display: inline;" onsubmit="return confirm('Tem certeza que deseja finalizar a compra?');">
            <button type="submit" class="btn">Finalizar compra</button>
        </form>
        <form th:action="@{/cliente/pedido/cancelar}" method="post" style="display: inline;" onsubmit="return confirm('Tem certeza que deseja cancelar o pedido?');">
            <button type="submit" class="btn" style="background: #dc2626;">Cancelar pedido</button>
        </form>
    </div>

</div>

</body>
</html>
